services:
  dashboard-app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: dashboard-app
    volumes:
      - ./:/var/www/html
      - /var/www/html/vendor
    working_dir: /var/www/html
    expose:
      - "9000"
    networks:
      - dashboard-net
    depends_on:
      - dashboard-mysql

  dashboard-web:
    image: nginx:alpine
    container_name: dashboard-nginx
    ports:
      - "81:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - dashboard-app
    networks:
      - dashboard-net

  dashboard-mysql:
    image: mysql:latest
    container_name: dashboard-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: dashboard
    ports:
      - "33061:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - dashboard-net

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: dashboard-phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: dashboard-mysql
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "8081:80"
    depends_on:
      - dashboard-mysql
    networks:
      - dashboard-net

networks:
  dashboard-net:
    name: dashboard-net
    driver: bridge
    
volumes:
  db_data:
